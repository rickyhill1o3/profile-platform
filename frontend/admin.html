<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <div class="container">
        <h1>Admin Panel</h1>

        <div style="margin-bottom: 1rem;">
            <button onclick="openUserDashboard()">Dashboard</button>
            <button onclick="goToChangePassword()">Change Password</button>
            <button onclick="logout()">Logout</button>
        </div>

        <section style="margin-bottom: 2rem;">
            <h2>Invite Codes</h2>
            <button onclick="createInvite()">Create Invite Code</button>
            <p id="inviteResult" style="margin-top: 1rem;"></p>

            <div style="margin: 1rem 0;">
                <strong>Active:</strong> <span id="activeInviteCount">0</span>
                &nbsp; | &nbsp;
                <strong>Used:</strong> <span id="usedInviteCount">0</span>
                &nbsp; | &nbsp;
                <strong>Canceled:</strong> <span id="canceledInviteCount">0</span>
            </div>

            <table border="1" cellpadding="10" cellspacing="0" width="100%">
                <thead>
                    <tr>
                        <th>Code</th>
                        <th>Status</th>
                        <th>Created</th>
                        <th>Used By</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="inviteTableBody"></tbody>
            </table>
        </section>

        <section style="margin-bottom: 2rem;">
            <h2>Users</h2>
            <p><strong>Total Users:</strong> <span id="userCount">0</span></p>

            <table border="1" cellpadding="10" cellspacing="0" width="100%">
                <thead>
                    <tr>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Profiles</th>
                        <th>Status</th>
                        <th>Created</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody"></tbody>
            </table>
        </section>

        <section>
            <h2>Export Profiles</h2>

            <div style="margin-bottom: 1rem;">
                <label for="exportUserFilter">Filter by User:</label>
                <select id="exportUserFilter" onchange="updateExportCount()">
                    <option value="">All Users</option>
                </select>
            </div>

            <div style="margin-bottom: 1rem;">
                <label for="exportGroupFilter">Filter by Group:</label>
                <select id="exportGroupFilter" onchange="updateExportCount()">
                    <option value="">All Groups</option>
                    <option value="general">General</option>
                    <option value="walmart">Walmart</option>
                    <option value="target">Target</option>
                    <option value="amazon">Amazon</option>
                </select>
            </div>

            <p id="exportCountBanner">0 profiles will be exported.</p>

            <button onclick="exportProfiles()">Export AYCD JSON</button>
            <button onclick="clearExportFilters()">Clear Filters</button>
        </section>
    </div>

    <script src="script.js"></script>
</body>

</html>
