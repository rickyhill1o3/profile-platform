<!DOCTYPE html>
<html>
<head>
  <title>Change Password</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
  <div class="auth-wrap">
    <div class="auth-card-modern">
      <p class="page-eyebrow">Profile Platform</p>
      <h1 class="auth-title">Change password</h1>
      <p class="auth-subtitle">Update your password for this account.</p>

      <form id="passwordForm" class="form-stack">
        <div class="input-shell">
          <label for="oldPassword">Current Password</label>
          <div class="password-row">
            <input id="oldPassword" type="password" placeholder="Current password" required>
            <button type="button" onclick="togglePasswordVisibility('oldPassword', this)">Show</button>
          </div>
        </div>

        <div class="input-shell">
          <label for="newPassword">New Password</label>
          <div class="password-row">
            <input id="newPassword" type="password" placeholder="New password" required>
            <button type="button" onclick="togglePasswordVisibility('newPassword', this)">Show</button>
          </div>
        </div>

        <button type="submit" class="primary-action">Update Password</button>
      </form>

      <p id="msg" class="auth-error"></p>

      <p class="auth-footer">
        <a href="dashboard.html">Back to dashboard</a>
      </p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
