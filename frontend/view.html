<!DOCTYPE html>
<html>
<head>
  <title>View Profile</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="dashboard-page">
  <div class="view-card modern-card">
    <p class="page-eyebrow">Profile Platform</p>
    <h1 class="auth-title" style="font-size:28px;">Profile Details</h1>
    <p class="auth-subtitle">Raw profile data view.</p>

    <pre id="profileData">Loading...</pre>

    <div class="profile-actions" style="margin-top:16px;">
      <button onclick="openUserDashboard()">Back to Dashboard</button>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    async function loadProfile() {
      const token = localStorage.getItem("token");
      const id = localStorage.getItem("view_profile");
      const API =
        window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
          ? "http://localhost:3000"
          : "https://profile-platform.onrender.com";

      const res = await fetch(API + "/profiles", {
        headers: { Authorization: "Bearer " + token }
      });

      const profiles = await res.json();
      const profile = Array.isArray(profiles) ? profiles.find(p => p.id === id) : profiles;
      document.getElementById("profileData").textContent =
        JSON.stringify(profile || { error: "Profile not found" }, null, 2);
    }

    loadProfile();
  </script>
</body>
</html>
