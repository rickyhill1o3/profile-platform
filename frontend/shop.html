<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Shore Shack | Shop</title>
  <meta name="description" content="Public storefront for The Shore Shack." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="marketing-page">
  <header class="marketing-header">
    <div class="marketing-shell marketing-nav">
      <a href="index.html" class="brand-mark">
        <span class="brand-mark__logo">TSS</span>
        <span>
          <strong>The Shore Shack</strong>
          <small>Public storefront</small>
        </span>
      </a>
      <nav class="marketing-links">
        <a href="index.html">Main</a>
        <a href="shop.html">Shop</a>
        <a href="guide.html">User Guide</a>
        <a href="login.html">Login</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="marketing-section shop-page-shell">
      <div class="marketing-shell">
        <div class="section-heading marketing-heading shop-hero">
          <div>
            <p class="eyebrow">Public shop</p>
            <h1>Shop products available to everyone.</h1>
            <p class="subtle-text shop-hero-copy">Browse inventory by category, then open checkout for any active item.</p>
          </div>
          <div class="shop-toolbar shop-toolbar--inline">
            <a class="btn" href="index.html">Back to Main</a>
            <a class="btn" href="guide.html">User Guide</a>
            <a class="btn btn-primary" href="login.html">User Login</a>
          </div>
        </div>

        <div class="shop-filter-bar">
          <div id="shop-category-tabs" class="shop-category-tabs"></div>
          <div class="shop-search-wrap">
            <input id="shop-search" class="input" type="search" placeholder="Search title or SKU" />
          </div>
        </div>

        <div id="shop-status" class="shop-status">Loading products...</div>
        <div id="shop-grid" class="products-grid products-grid--shop"></div>
      </div>
    </section>
  </main>

  <script src="shop.js"></script>
</body>
</html>
