
<!DOCTYPE html>
<html>
<head>
    <title>Create Account</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
    <div class="auth-wrap">
        <div class="auth-card">
            <p class="page-eyebrow">Profile Platform</p>
            <h1 class="auth-title">Create your account</h1>
            <p class="auth-subtitle">Use your invite code to join. A welcome email will be sent after signup if email is configured.</p>

            <form id="signupForm" class="form-stack">
                <div class="input-shell">
                    <label for="email">Email</label>
                    <input id="email" placeholder="you@example.com" required>
                </div>

                <div class="input-shell">
                    <label for="password">Password</label>
                    <div class="password-row">
                        <input id="password" type="password" placeholder="Create a password" required>
                        <button type="button" onclick="togglePasswordVisibility('password', this)">Show</button>
                    </div>
                </div>

                <div class="input-shell">
                    <label for="invite">Invite Code</label>
                    <input id="invite" placeholder="Invite Code" required>
                </div>

                <button type="submit" class="primary-action">Create Account</button>
            </form>

            <p id="error" class="auth-error"></p>

            <p class="auth-footer">
                Already have an account? <a href="login.html">Login</a>
            </p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
