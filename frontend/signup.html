<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Signup</title><link rel="stylesheet" href="styles.css"/></head>
<body class="auth-page"><div class="auth-shell"><div class="auth-card">
<p class="eyebrow">Profile Platform</p><h1>Create account</h1><p class="subtle-text">Use an invite code to join.</p>
<form id="signupForm" class="form-stack">
<div class="field"><label for="email">Email</label><input class="input" id="email" required /></div>
<div class="field"><label for="password">Password</label><div class="password-row"><input class="input" id="password" type="password" required /><button class="btn" type="button" onclick="togglePasswordVisibility('password', this)">Show</button></div></div>
<div class="field"><label for="invite">Invite Code</label><input class="input" id="invite" required /></div>
<button class="btn btn-primary" type="submit">Create Account</button><button class="btn" type="button" onclick="startDiscordOAuth('signup')">Sign up with Discord</button></form>
<p id="error" class="error-text"></p>
<p class="subtle-text">Already have an account? <a href="login.html">Login</a></p>
</div></div><script src="script.js?v=20260322b">

// MULTI SKU HELPERS
function parseMultiSkuValue(rawValue) {
    if (!rawValue) return [];
    return String(rawValue)
        .split(/[
,]+/)
        .map(v => v.trim())
        .filter(Boolean);
}

function countEffectiveSkus(product) {
    if (!product) return 0;

    if (Array.isArray(product.multiSkus) && product.multiSkus.length) {
        return product.multiSkus.length;
    }

    if (typeof product.sku === "string") {
        return parseMultiSkuValue(product.sku).length || 1;
    }

    return 1;
}

function removeDuplicateSingleSkuProducts(products) {
    if (!Array.isArray(products)) return [];

    const groupedSkuSet = new Set();

    products.forEach(product => {
        const skuList = parseMultiSkuValue(product.sku);

        if (skuList.length > 1) {
            skuList.forEach(sku => groupedSkuSet.add(String(sku).trim()));
        }
    });

    return products.filter(product => {
        const skuList = parseMultiSkuValue(product.sku);

        // keep grouped item
        if (skuList.length > 1) return true;

        // remove old single sku duplicates
        return !groupedSkuSet.has(String(product.sku).trim());
    });
}

</script></body></html>
