
<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
    <div class="auth-wrap">
        <div class="auth-card">
            <p class="page-eyebrow">Profile Platform</p>
            <h1 class="auth-title">Reset password</h1>
            <p class="auth-subtitle">Choose a new password for your account.</p>

            <form id="resetPasswordForm" class="form-stack">
                <div class="input-shell">
                    <label for="resetNewPassword">New Password</label>
                    <div class="password-row">
                        <input id="resetNewPassword" type="password" placeholder="New password" required>
                        <button type="button" onclick="togglePasswordVisibility('resetNewPassword', this)">Show</button>
                    </div>
                </div>
                <button type="submit" class="primary-action">Update Password</button>
            </form>

            <p id="resetMsg" class="auth-error"></p>
            <p class="auth-footer"><a href="login.html">Back to login</a></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
