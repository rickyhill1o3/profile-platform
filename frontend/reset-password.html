function expandMultiSkuExportLine(line) {
    if (!line || !line.includes(";")) return [line];

    const parts = line.split(";");
    if (parts.length < 3) return [line];

    const skuPart = parts[0].trim();
    const productName = parts[1];
    const price = parts.slice(2).join(";");

    const skus = skuPart
        .split(/[
,]+/)
        .map(v => v.trim())
        .filter(Boolean);

    if (skus.length <= 1) return [line];

    return skus.map(sku => `${sku};${productName};${price}`);
}

function normalizeSelectedProducts(products) {
    if (!Array.isArray(products)) return [];

    const groupedSkus = new Set();

    products.forEach(product => {
        const skus = String(product.sku || "")
            .split(/[
,]+/)
            .map(v => v.trim())
            .filter(Boolean);

        if (skus.length > 1) {
            skus.forEach(s => groupedSkus.add(s));
        }
    });

    return products.filter(product => {
        const skus = String(product.sku || "")
            .split(/[
,]+/)
            .map(v => v.trim())
            .filter(Boolean);

        if (skus.length > 1) return true;

        if (skus.length === 1 && groupedSkus.has(skus[0])) {
            return false;
        }

        return true;
    });
}

function countEffectiveSkus(product) {
    if (!product) return 0;

    if (Array.isArray(product.multiSkus) && product.multiSkus.length) {
        return product.multiSkus.length;
    }

    if (typeof product.sku === "string") {
        return parseMultiSkuValue(product.sku).length || 1;
    }

    return 1;
}

function removeDuplicateSingleSkuProducts(products) {
    if (!Array.isArray(products)) return [];

    const groupedSkuSet = new Set();

    products.forEach(product => {
        const skuList = parseMultiSkuValue(product.sku);

        if (skuList.length > 1) {
            skuList.forEach(sku => groupedSkuSet.add(String(sku).trim()));
        }
    });

    return products.filter(product => {
        const skuList = parseMultiSkuValue(product.sku);

        // keep grouped item
        if (skuList.length > 1) return true;

        // remove old single sku duplicates
        return !groupedSkuSet.has(String(product.sku).trim());
    });
}
