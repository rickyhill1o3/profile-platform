<!DOCTYPE html>
<html>

<head>
    <title>Create / Edit Profile</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <h1>Create / Edit Profile</h1>

        <div style="margin-bottom: 1rem;">
            <button onclick="location='dashboard.html'">Back to Dashboard</button>
            <button id="adminPanelButtonProfile" onclick="openAdminPanel()" style="display:none;">Admin Panel</button>
            <button onclick="goToChangePassword()">Change Password</button>
            <button onclick="logout()">Logout</button>
        </div>

        <form id="profileForm">
            <h2>Profile Info</h2>

            <label>Profile Name</label>
            <input id="profile_name" required>

            <label>Account Type</label>
            <select id="account_type" required>
                <option value="general">General</option>
                <option value="walmart">Walmart</option>
                <option value="target">Target</option>
                <option value="amazon">Amazon</option>
            </select>

            <div id="accountCredentialsSection" style="display:none; margin-top: 1.5rem;">
                <h3>Account Credentials</h3>

                <div id="gmailAccountFields" style="display:none;">
                    <label>Login Email</label>
                    <input id="account_login_email" type="email" placeholder="name@gmail.com">

                    <label>Login Password</label>
                    <input id="account_login_password" type="text" placeholder="Account password">

                    <label>Gmail App Password</label>
                    <input id="gmail_app_password" type="text" placeholder="16-character Gmail app password">
                </div>

                <div id="amazonAccountFields" style="display:none;">
                    <label>Amazon Account Email</label>
                    <input id="amazon_login_email" type="email" placeholder="Amazon email">

                    <label>Amazon Account Password</label>
                    <input id="amazon_login_password" type="text" placeholder="Amazon password">

                    <label>Amazon Authenticator Secret</label>
                    <input id="amazon_2fa_secret" type="text" placeholder="Authenticator setup secret">
                </div>
            </div>

            <h2 style="margin-top: 1.5rem;">Shipping / Billing</h2>

            <label>First Name</label>
            <input id="first_name" required>

            <label>Last Name</label>
            <input id="last_name" required>

            <label>Email</label>
            <input id="email" type="email" required>

            <label>Phone</label>
            <input id="phone" required placeholder="10 digit phone number">

            <label>Address 1</label>
            <input id="address1" required>

            <label>City</label>
            <input id="city" required>

            <label>State</label>
            <input id="state" required>

            <label>Zip</label>
            <input id="zip" required>

            <h2 style="margin-top: 1.5rem;">Payment</h2>

            <label>Card Number</label>
            <input id="card" required>

            <label>Exp Month</label>
            <input id="exp_month" required>

            <label>Exp Year</label>
            <input id="exp_year" required>

            <label>CVV</label>
            <input id="cvv" required>

            <p id="profileMessage" style="margin-top: 1rem;"></p>

            <div style="margin-top: 1rem;">
                <button type="submit">Save Profile</button>
            </div>
        </form>
    </div>

    <script src="script.js"></script>
</body>

</html>
