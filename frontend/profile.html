<!DOCTYPE html>
<html>

<head>
    <title>Profile Editor</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="header modern-header">
        <div>
            <h1>Profile Editor</h1>
            <p class="subtle-text">Create or update a profile</p>
        </div>

        <div class="header-actions">
            <button onclick="openUserDashboard()">Back to Dashboard</button>
            <button id="adminPanelButtonProfile" style="display:none;" onclick="openAdminPanel()">Admin Panel</button>
            <button onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="page-shell">
        <div class="form-card">

            <form id="profileForm">

                <h2>Profile Details</h2>
                <p class="subtle-text">Billing address is always the same as shipping.</p>

                <!-- PROFILE -->
                <div class="form-section-title">Profile</div>

                <div class="form-grid">
                    <div class="full-width">
                        <input id="profile_name" placeholder="Profile Name" required>
                    </div>

                    <div class="full-width">
                        <select id="account_type" required>
                            <option value="general">General</option>
                            <option value="walmart">Walmart</option>
                            <option value="target">Target</option>
                            <option value="amazon">Amazon</option>
                        </select>
                    </div>
                </div>


                <!-- ACCOUNT LOGIN DETAILS -->
                <div id="accountCredentialsSection" style="display:none;">

                    <div class="form-section-title">Account Login Details</div>

                    <!-- Walmart / Target -->
                    <div id="gmailAccountFields" class="form-grid" style="display:none;">

                        <div class="full-width">
                            <input id="account_login_email" placeholder="Login Email (must be Gmail)">
                        </div>

                        <div class="full-width">
                            <input id="account_login_password" placeholder="Account Password">
                        </div>

                        <div class="full-width">
                            <input id="gmail_app_password" placeholder="Gmail App Password">
                        </div>

                    </div>


                    <!-- Amazon -->
                    <div id="amazonAccountFields" class="form-grid" style="display:none;">

                        <div class="full-width">
                            <input id="amazon_login_email" placeholder="Amazon Account Email">
                        </div>

                        <div class="full-width">
                            <input id="amazon_login_password" placeholder="Amazon Account Password">
                        </div>

                        <div class="full-width">
                            <input id="amazon_2fa_secret" placeholder="Amazon Authenticator Secret">
                        </div>

                    </div>

                </div>


                <!-- SHIPPING -->
                <div class="form-section-title">Shipping</div>

                <div class="form-grid">
                    <input id="first_name" placeholder="First Name" required>
                    <input id="last_name" placeholder="Last Name" required>

                    <div class="full-width">
                        <input id="email" placeholder="Email" required>
                    </div>

                    <div class="full-width">
                        <input id="phone" placeholder="Phone (xxxxxxxxxx)" maxlength="10" required>
                    </div>

                    <div class="full-width">
                        <input id="address1" placeholder="Address" required>
                    </div>

                    <input id="city" placeholder="City" required>

                    <select id="state" required>
                        <option value="">Select State</option>
                        <option>Alabama</option>
                        <option>Alaska</option>
                        <option>Arizona</option>
                        <option>Arkansas</option>
                        <option>California</option>
                        <option>Colorado</option>
                        <option>Connecticut</option>
                        <option>Delaware</option>
                        <option>Florida</option>
                        <option>Georgia</option>
                        <option>Hawaii</option>
                        <option>Idaho</option>
                        <option>Illinois</option>
                        <option>Indiana</option>
                        <option>Iowa</option>
                        <option>Kansas</option>
                        <option>Kentucky</option>
                        <option>Louisiana</option>
                        <option>Maine</option>
                        <option>Maryland</option>
                        <option>Massachusetts</option>
                        <option>Michigan</option>
                        <option>Minnesota</option>
                        <option>Mississippi</option>
                        <option>Missouri</option>
                        <option>Montana</option>
                        <option>Nebraska</option>
                        <option>Nevada</option>
                        <option>New Hampshire</option>
                        <option>New Jersey</option>
                        <option>New Mexico</option>
                        <option>New York</option>
                        <option>North Carolina</option>
                        <option>North Dakota</option>
                        <option>Ohio</option>
                        <option>Oklahoma</option>
                        <option>Oregon</option>
                        <option>Pennsylvania</option>
                        <option>Rhode Island</option>
                        <option>South Carolina</option>
                        <option>South Dakota</option>
                        <option>Tennessee</option>
                        <option>Texas</option>
                        <option>Utah</option>
                        <option>Vermont</option>
                        <option>Virginia</option>
                        <option>Washington</option>
                        <option>West Virginia</option>
                        <option>Wisconsin</option>
                        <option>Wyoming</option>
                    </select>

                    <input id="zip" placeholder="Zip" required>
                </div>


                <!-- PAYMENT -->
                <div class="form-section-title">Payment</div>

                <div class="form-grid">

                    <div class="full-width">
                        <input id="card" placeholder="Card Number" required>
                    </div>

                    <input id="exp_month" placeholder="Exp Month (MM)" required>
                    <input id="exp_year" placeholder="Exp Year (YYYY)" required>

                    <div class="full-width">
                        <input id="cvv" placeholder="CVV" required>
                    </div>

                </div>


                <div class="card-actions" style="margin-top:20px;">
                    <button type="submit">Save Profile</button>
                    <button type="button" onclick="openUserDashboard()">Cancel</button>
                </div>

                <p id="profileMessage" class="subtle-text" style="margin-top:14px;"></p>

            </form>

        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
