
<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
    <div class="auth-wrap">
        <div class="auth-card">
            <p class="page-eyebrow">Profile Platform</p>
            <h1 class="auth-title">Forgot password</h1>
            <p class="auth-subtitle">Enter your email and we’ll send a reset link.</p>

            <form id="forgotPasswordForm" class="form-stack">
                <div class="input-shell">
                    <label for="forgotEmail">Email</label>
                    <input id="forgotEmail" placeholder="you@example.com" required>
                </div>
                <button type="submit" class="primary-action">Send Reset Link</button>
            </form>

            <p id="forgotMsg" class="auth-error"></p>
            <p class="auth-footer"><a href="login.html">Back to login</a></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
